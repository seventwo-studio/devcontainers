name: Publish Docker Images

on:
  workflow_dispatch:
  schedule:
    # Run nightly at 3am UTC
    - cron: "0 3 * * *"
  workflow_run:
    workflows: ["Release Please"]
    types: [completed]
    branches: [main]

jobs:
  # Build base Docker image
  publish-base:
    name: Build and Push base Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: version
        run: echo "version=$(cat images/base/version.txt | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/seventwo-studio/base
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha

      - name: Build and Push base
        uses: docker/build-push-action@v7
        with:
          context: ./images/base
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=ghcr.io/seventwo-studio/base:buildcache
            type=registry,ref=ghcr.io/seventwo-studio/base:latest
          cache-to: type=registry,ref=ghcr.io/seventwo-studio/base:buildcache,mode=max

  # Build settings-gen Docker image
  publish-settings-gen:
    name: Build and Push settings-gen Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/seventwo-studio/settings-gen
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and Push settings-gen
        uses: docker/build-push-action@v7
        with:
          context: ./images/settings-gen
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=ghcr.io/seventwo-studio/settings-gen:buildcache
            type=registry,ref=ghcr.io/seventwo-studio/settings-gen:latest
          cache-to: type=registry,ref=ghcr.io/seventwo-studio/settings-gen:buildcache,mode=max

  # Pre-build template images
  prebuild-templates:
    name: Pre-build ${{ matrix.template }} Template
    runs-on: ubuntu-latest
    needs: [publish-base]
    strategy:
      fail-fast: false
      matrix:
        template:
          - base
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pre-build devcontainer
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/seventwo-studio/devcontainer-${{ matrix.template }}
          cacheFrom: ghcr.io/seventwo-studio/devcontainer-${{ matrix.template }}
          push: always
          platform: linux/amd64,linux/arm64
          configFile: ./templates/${{ matrix.template }}/image/devcontainer.json
